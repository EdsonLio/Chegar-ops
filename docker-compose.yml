version: '3.9'

services:
  frontend:
    build: .
    ports:
      - '5173:5173'
    volumes:
      - .:/app
    command: npm run dev -- --host

  api:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c 'npm install && npm run api'
    ports:
      - '3000:3000'

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chegar_ops
      POSTGRES_USER: chegar
      POSTGRES_PASSWORD: chegar_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
